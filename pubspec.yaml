name: newsreader
description: Newsletter Hub — centralize your newsletters outside of email.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.0.0

  # Local database
  hive_ce: ^2.9.0
  hive_ce_flutter: ^2.2.0

  # Networking & Feeds
  http: ^1.2.0
  webfeed_plus: ^1.0.0

  # UI
  cached_network_image: ^3.4.0
  flutter_widget_from_html: ^0.15.0
  webview_flutter: ^4.7.0

  # Dependency injection
  get_it: ^8.0.0

  # Utils
  uuid: ^4.5.0
  intl: ^0.19.0

  # OPML Import
  file_picker: ^8.0.0
  xml: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  hive_ce_generator: ^1.8.0
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/reevo_logo.png
  min_sdk_android: 21
  remove_alpha_ios: true
